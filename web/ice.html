<!DOCTYPE html>
<html>
<head>
<title>Chill zone</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
overflow:hidden;
color:black;
background: #000; /* Fallback */
}

/* VIDEO BACKGROUND SETTINGS */
.video-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -2;
    overflow: hidden;
}

.video-bg video {
    min-width: 100%;
    min-height: 100%;
    width: auto;
    height: auto;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    object-fit: cover;
}

/* OVERLAY TO MAINTAIN THE COLOR THEME FROM YOUR GRADIENT */
.video-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, rgba(255, 192, 243, 0.4), rgba(224, 179, 255, 0.4));
    z-index: -1;
}

/* NAVBAR */
nav{
position:fixed;
top:0;
width:100%;
padding:20px 60px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,0.2);
backdrop-filter:blur(15px);
z-index: 1000;
}

/* LOGO */
#logo{
color:black;
transition:0.3s ease;
}

#logo.glow{
text-shadow:
0 0 8px rgba(255,180,255,0.7),
0 0 16px rgba(220,150,255,0.6),
0 0 24px rgba(255,200,255,0.5);
}

nav ul{
display:flex;
gap:20px;
list-style:none;
}

/* NAV BUTTONS */
nav ul li a{
position:relative;
padding:10px 25px;
border-radius:30px;
text-decoration:none;
color:black;
border:1px solid rgba(0,0,0,0.2);
overflow:hidden;
display:inline-block;
transition:0.3s;
background: rgba(255,255,255,0.1);
}

nav ul li a::before{
content:"";
position:absolute;
bottom:-100%;
left:0;
width:100%;
height:100%;
background:linear-gradient(
to top,
rgba(255,192,243,0.7),
rgba(224,179,255,0.7)
);
transition:0.6s ease;
z-index:-1;
}

nav ul li a:hover::before{
bottom:0;
animation:waterFloat 2s ease-in-out infinite;
}

nav ul li a:hover{
transform:translateY(-4px);
box-shadow:0 0 15px rgba(224,179,255,0.5);
}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 80px;
position: relative;
}

.hero-text{
max-width:500px;
z-index: 2;
}

.hero-text h1{
font-size:70px;
line-height:1.1;
margin-bottom:20px;
color: #000;
}

.hero-text p{
margin-bottom:30px;
font-weight: 500;
}

/* BUTTON */
.hero-btn{
position:relative;
background:rgba(255,255,255,0.6);
color:black;
padding:15px 35px;
border:1px solid rgba(255,255,255,0.3);
border-radius:30px;
cursor:pointer;
backdrop-filter:blur(10px);
overflow:hidden;
transition:0.3s;
font-weight: 600;
animation:btnFloat 3s ease-in-out infinite;
}

.hero-btn::before{
content:"";
position:absolute;
bottom:-100%;
left:0;
width:100%;
height:100%;
background:linear-gradient(
to top,
rgba(255,192,243,0.8),
rgba(224,179,255,0.8)
);
transition:0.6s ease;
z-index:-1;
}

.hero-btn:hover::before{
bottom:0;
animation:waterFloat 2s ease-in-out infinite;
}

.hero-btn:hover{
transform:translateY(-6px) scale(1.05);
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

/* IMAGE */
.hero-img{
position:relative;
animation:float 4s ease-in-out infinite;
z-index: 2;
}

.hero-img::before{
content:"";
position:absolute;
top:-20px;
left:-20px;
width:100%;
height:100%;
background:rgba(255,255,255,0.2);
backdrop-filter:blur(12px);
border-radius:25px;
z-index:-1;
border: 1px solid rgba(255,255,255,0.3);
}

.hero-img img{
width:420px;
border-radius:20px;
box-shadow: 0 20px 40px rgba(0,0,0,0.15);
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-20px);}
100%{transform:translateY(0px);}
}

@keyframes waterFloat{
0%{ transform:translateY(0); }
50%{ transform:translateY(-4px); }
100%{ transform:translateY(0); }
}

@keyframes btnFloat{
0%{ transform:translateY(0px); }
50%{ transform:translateY(-6px); }
100%{ transform:translateY(0px); }
}

</style>
</head>

<body>

<!-- VIDEO BACKGROUND START -->
<div class="video-bg">
    <video autoplay muted loop playsinline>
        <source src="s.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
</div>
<div class="video-overlay"></div>
<!-- VIDEO BACKGROUND END -->

<nav>
<h2 id="logo">CHILLZONE</h2>
<ul>
<li><a href="login.html">Login</a></li>
<li><a href="aboutus.html">About</a></li>
</ul>
</nav>

<section class="hero">

<div class="hero-text">
<h1>CHILL ZONE <br>ICE CREAM</h1>

<p>
Fresh-from-the-farm ice cream transformed into tasty treats
like sundaes, milkshakes and more.
</p>

<button class="hero-btn" onclick="window.location.href='index.html'">
GO TO SHOP
</button>

</div>

<div class="hero-img">
<img src="zone.jpg">
</div>

</section>

<script>
const logo = document.getElementById("logo");

document.addEventListener("mousemove", (e) => {
    const rect = logo.getBoundingClientRect();

    const logoCenterX = rect.left + rect.width / 2;
    const logoCenterY = rect.top + rect.height / 2;

    const distance = Math.hypot(
        e.clientX - logoCenterX,
        e.clientY - logoCenterY
    );

    if(distance < 150){
        logo.classList.add("glow");
    }else{
        logo.classList.remove("glow");
    }
});
</script>

</body>
</html>
